name: LLM-HDL-Bench

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  run-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys iverilog
          yosys -V
          iverilog -V 2>&1 | head -n 3

      - name: Assert Yosys/Icarus version pins
        run: |
          yosys -V | tee /tmp/yosys.ver
          grep -E "Yosys 0\.33" /tmp/yosys.ver
          iverilog -V 2>&1 | tee /tmp/iverilog.ver | head -n 1
          grep -E "12\.0" /tmp/iverilog.ver

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Harness self-tests (pipeline logic, not the RTL under test)
        run: python3 pipeline/test_pipeline.py -v

      - name: Run full benchmark pipeline (post-fix corpus)
        run: python3 pipeline/run_all.py

      - name: Confirm aggregate 46/46 in generated report
        run: |
          grep -F "Aggregate pass rate: **46/46 (100.0%)**" reports/VALIDATION_REPORT.md

      - name: Upload results DB + report as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llm-hdl-bench-results
          path: |
            results_db/results.db
            reports/VALIDATION_REPORT.md
            artifacts/toolchain_versions.txt

      - name: Print report to job summary
        run: cat reports/VALIDATION_REPORT.md >> $GITHUB_STEP_SUMMARY
